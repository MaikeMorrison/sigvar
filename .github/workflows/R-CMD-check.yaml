# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml
permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install Biostrings from Bioconductor for devel (avoids ABI mismatch)
        if: matrix.config.r == 'devel'
        run: |
          install.packages("BiocManager")
          BiocManager::install(version = BiocManager::version(), ask = FALSE, update = FALSE)
          BiocManager::install("Biostrings", ask = FALSE, force = TRUE)
        shell: Rscript {0}

      - name: Install dependencies manually for oldrel-1 (pak cannot resolve ggrepel)
        if: matrix.config.r == 'oldrel-1'
        run: |
          install.packages("remotes")
          install.packages("BiocManager")
          # Install pinned ggrepel FIRST before ggpubr pulls in the latest
          remotes::install_version("ggrepel", version = "0.9.5", 
                                   repos = "https://cran.r-project.org",
                                   upgrade = "never")
          # Install Bioconductor dependencies
          BiocManager::install(c(
            "GenomicFeatures",
            "BSgenome.Hsapiens.UCSC.hg38",
            "BSgenome.Hsapiens.UCSC.hg19",
            "BSgenome.Mmusculus.UCSC.mm10",
            "rtracklayer",
            "TxDb.Hsapiens.UCSC.hg38.knownGene",
            "TxDb.Mmusculus.UCSC.mm10.knownGene"
          ), ask = FALSE, update = FALSE)                         
          # Then install remaining CRAN deps, telling remotes never to upgrade ggrepel
          remotes::install_deps(dependencies = TRUE, upgrade = "never")
          install.packages("rcmdcheck")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: matrix.config.r != 'oldrel-1'
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
